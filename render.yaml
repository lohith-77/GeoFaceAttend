services:
  - type: web
    name: geofaceattend-api
    env: node
    rootDir: email-api
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASS
        sync: false
      - key: JWT_SECRET
        generateValue: true

  - type: static
    name: geofaceattend
    rootDir: .
    buildCommand: echo "Static site, no build needed"
    staticPublishPath: .
    envVars:
      - key: API_URL
        value: https://geofaceattend-api.onrender.com