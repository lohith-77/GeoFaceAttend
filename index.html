<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFaceAttend - Role Selection</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GeoFaceAttend">
    <meta name="theme-color" content="#4361ee">
    <link rel="apple-touch-icon" href="/assets/icons/icon-152x152.png">
</head>

<body>
    <div class="role-container">
        <div class="role-card animate-scale">
            <div class="logo">
                <i class="fas fa-fingerprint"></i>
                <h1>GeoFaceAttend</h1>
            </div>

            <div class="time-display">
                <span class="time-label">System Time</span>
                <span class="time-value" id="currentTime"></span>
            </div>

            <h2 class="select-title">Select Your Role</h2>
            <p class="select-subtitle">Choose your access level to continue</p>

            <div class="role-buttons">
                <button onclick="selectRole('employee')" class="role-btn employee-btn">
                    <div class="btn-icon">👤</div>
                    <div class="btn-text">
                        <span class="btn-title">Employee</span>
                        <span class="btn-desc">Mark attendance & apply leave</span>
                    </div>
                </button>
                <button onclick="selectRole('admin')" class="role-btn admin-btn">
                    <div class="btn-icon">⚙️</div>
                    <div class="btn-text">
                        <span class="btn-title">Admin</span>
                        <span class="btn-desc">Manage employees & reports</span>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <script>
        function selectRole(role) {
            localStorage.setItem('selectedRole', role);
            window.location.href = 'auth.html';
        }

        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent =
                now.toLocaleTimeString('en-US', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                });
        }
        updateTime();
        setInterval(updateTime, 1000);
    </script>

    <!-- Register Service Worker -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('✅ Service Worker registered:', registration.scope);
                    })
                    .catch(error => {
                        console.log('❌ Service Worker registration failed:', error);
                    });
            });

            window.addEventListener('online', () => {
                document.body.classList.remove('offline');
            });

            window.addEventListener('offline', () => {
                document.body.classList.add('offline');
            });
        }
    </script>
</body>

</html>
