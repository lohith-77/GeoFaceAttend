<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoFaceAttend - Authentication</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GeoFaceAttend">
    <meta name="theme-color" content="#4361ee">
    <link rel="apple-touch-icon" href="/assets/icons/icon-152x152.png">

    <style>
        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
            display: block;
        }

        .form-group input.error,
        .form-group select.error {
            border-color: #ef4444;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            animation: scaleIn 0.3s ease;
            border: 1px solid var(--border-color);
            position: relative;
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-header h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .modal-header p {
            color: var(--text-muted);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .otp-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .otp-timer {
            text-align: center;
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        .otp-timer span {
            font-weight: 600;
            color: var(--primary);
        }

        .otp-timer button {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            margin-left: 10px;
        }

        .otp-timer button:disabled {
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .demo-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(67, 97, 238, 0.1);
            padding: 8px;
            border-radius: 8px;
        }

        .password-strength {
            margin-top: 5px;
            height: 4px;
            background: var(--border-color);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background 0.3s;
        }

        .strength-bar.weak {
            width: 33.33%;
            background: #ef4444;
        }

        .strength-bar.medium {
            width: 66.66%;
            background: #f59e0b;
        }

        .strength-bar.strong {
            width: 100%;
            background: #10b981;
        }

        .role-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .role-badge.employee {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .role-badge.admin {
            background: rgba(67, 97, 238, 0.15);
            color: #4361ee;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-card animate-slide">
            <div class="auth-header">
                <button onclick="window.location.href='index.html'" class="back-btn">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
                <div class="logo">
                    <i class="fas fa-fingerprint"></i>
                    <h2>GeoFaceAttend</h2>
                </div>
            </div>

            <!-- Role Display -->
            <div class="role-badge" id="roleDisplay">Employee Portal</div>

            <!-- Login Form -->
            <div id="loginForm" class="auth-form active">
                <h3>Welcome Back</h3>
                <p class="auth-subtitle">Login with your Employee ID</p>

                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Employee ID</label>
                    <input type="text" id="loginEmpId" placeholder="Enter your employee ID" value="ADM001">
                    <small class="error-message" id="loginEmpIdError"></small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" value="admin123">
                    <small class="error-message" id="loginPasswordError"></small>
                </div>

                <button onclick="handleLogin()" class="btn-primary btn-block" id="loginBtn">
                    <i class="fas fa-paper-plane"></i> Login & Send OTP
                </button>

                <p class="auth-switch">
                    Don't have an account?
                    <a href="#" onclick="showRegister()">Register here</a>
                </p>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="auth-form">
                <h3>Create Account</h3>
                <p class="auth-subtitle">Register as new user</p>

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" id="regName" placeholder="Enter your full name">
                    <small class="error-message" id="regNameError"></small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="regEmail" placeholder="Enter your email">
                    <small class="error-message" id="regEmailError"></small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-id-card"></i> Employee ID</label>
                    <input type="text" id="regEmpId" placeholder="Enter employee ID">
                    <small class="error-message" id="regEmpIdError"></small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password (min. 6 characters)</label>
                    <input type="password" id="regPassword" placeholder="Create a password">
                    <div class="password-strength">
                        <div class="strength-bar" id="passwordStrength"></div>
                    </div>
                    <small class="error-message" id="regPasswordError"></small>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-building"></i> Department</label>
                    <select id="regDept">
                        <option value="">Select Department</option>
                        <option value="Engineering">Engineering</option>
                        <option value="Sales">Sales</option>
                        <option value="Marketing">Marketing</option>
                        <option value="HR">Human Resources</option>
                        <option value="Finance">Finance</option>
                        <option value="Operations">Operations</option>
                    </select>
                    <small class="error-message" id="regDeptError"></small>
                </div>

                <button onclick="handleRegister()" class="btn-primary btn-block" id="registerBtn">
                    <i class="fas fa-user-plus"></i> Register & Send OTP
                </button>

                <p class="auth-switch">
                    Already have an account?
                    <a href="#" onclick="showLogin()">Login here</a>
                </p>
            </div>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otpModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeOTPModal()">&times;</button>
            <div class="modal-header">
                <h3><i class="fas fa-shield-alt"></i> Email Verification</h3>
                <p>Enter the 6-digit code sent to your email</p>
            </div>

            <div class="otp-container">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 0)"
                    onkeypress="allowOnlyNumbers(event)" autofocus>
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 1)"
                    onkeypress="allowOnlyNumbers(event)">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 2)"
                    onkeypress="allowOnlyNumbers(event)">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 3)"
                    onkeypress="allowOnlyNumbers(event)">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 4)"
                    onkeypress="allowOnlyNumbers(event)">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveToNext(this, 5)"
                    onkeypress="allowOnlyNumbers(event)">
            </div>

            <div class="otp-timer">
                <span id="otpTimer">02:00</span>
                <button onclick="resendOTP()" id="resendBtn" disabled>Resend Code</button>
            </div>

            <button onclick="verifyOTP()" class="btn-primary btn-block" id="verifyBtn">
                <i class="fas fa-check"></i> Verify & Continue
            </button>

            <p class="demo-note">Demo: Use code <strong>123456</strong></p>
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = window.API_URL || (window.location.hostname === 'localhost' ? 'http://localhost:5001' : 'https://geofaceattend-api.onrender.com');
        let otpTimer = null;

        // Get selected role from localStorage
        const selectedRole = localStorage.getItem('selectedRole') || 'employee';
        document.getElementById('roleDisplay').textContent = selectedRole === 'admin' ? 'Admin Portal' : 'Employee Portal';
        document.getElementById('roleDisplay').className = `role-badge ${selectedRole}`;

        // Password strength indicator
        document.getElementById('regPassword')?.addEventListener('input', function (e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('passwordStrength');
            if (strengthBar) {
                if (password.length < 6) {
                    strengthBar.className = 'strength-bar weak';
                } else if (password.length < 8) {
                    strengthBar.className = 'strength-bar medium';
                } else {
                    strengthBar.className = 'strength-bar strong';
                }
            }
        });

        // Show/hide forms
        function showLogin() {
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
            clearErrors();
        }

        function showRegister() {
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginForm').classList.remove('active');
            clearErrors();
        }

        function clearErrors() {
            document.querySelectorAll('.error-message').forEach(el => el.textContent = '');
        }

        // Login function
        async function handleLogin() {
            const empId = document.getElementById('loginEmpId').value.trim();
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');

            if (!empId || !password) {
                alert('Please enter both Employee ID and Password');
                return;
            }

            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Logging in...';

            try {
                console.log('Attempting login with:', { empId, password });

                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ empId, password })
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (data.success) {
                    // Store user data
                    sessionStorage.setItem('token', data.token);
                    sessionStorage.setItem('currentUser', JSON.stringify(data.user));

                    // Show OTP modal
                    document.getElementById('otpModal').style.display = 'flex';
                    startOTPTimer();

                    // Clear any previous OTP inputs
                    document.querySelectorAll('.otp-input').forEach(input => input.value = '');
                    document.querySelectorAll('.otp-input')[0]?.focus();
                } else {
                    alert('Invalid credentials. Try ADM001/admin123 or EMP001/emp123');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Cannot connect to server. Make sure backend is running on port 5001');
            } finally {
                // Restore button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Login & Send OTP';
            }
        }

        // Register function
        async function handleRegister() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const empId = document.getElementById('regEmpId').value.trim();
            const password = document.getElementById('regPassword').value;
            const dept = document.getElementById('regDept').value;
            const registerBtn = document.getElementById('registerBtn');

            if (!name || !email || !empId || !password || !dept) {
                alert('Please fill all fields');
                return;
            }

            if (password.length < 6) {
                alert('Password must be at least 6 characters');
                return;
            }

            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading-spinner"></span> Registering...';

            try {
                const response = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name,
                        email,
                        empId,
                        password,
                        department: dept
                    })
                });

                const data = await response.json();

                if (data.success) {
                    alert('Registration successful! Please login.');
                    showLogin();
                } else {
                    alert(data.error || 'Registration failed');
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Cannot connect to server');
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Register & Send OTP';
            }
        }

        // OTP Functions
        function startOTPTimer() {
            if (otpTimer) clearInterval(otpTimer);

            let timeLeft = 120;
            const timerDisplay = document.getElementById('otpTimer');
            const resendBtn = document.getElementById('resendBtn');

            if (timerDisplay) timerDisplay.textContent = '02:00';
            if (resendBtn) resendBtn.disabled = true;

            otpTimer = setInterval(() => {
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                if (timerDisplay) {
                    timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                }

                if (timeLeft <= 0) {
                    clearInterval(otpTimer);
                    if (timerDisplay) timerDisplay.textContent = '00:00';
                    if (resendBtn) resendBtn.disabled = false;
                }
                timeLeft--;
            }, 1000);
        }

        function moveToNext(input, index) {
            if (input.value.length === 1) {
                const next = document.querySelectorAll('.otp-input')[index + 1];
                if (next) next.focus();
            }
        }

        function allowOnlyNumbers(event) {
            const charCode = event.which ? event.which : event.keyCode;
            if (charCode < 48 || charCode > 57) {
                event.preventDefault();
            }
        }

        function resendOTP() {
            alert('OTP resent (Demo: 123456)');
            startOTPTimer();
            document.querySelectorAll('.otp-input').forEach(input => input.value = '');
            document.querySelectorAll('.otp-input')[0]?.focus();
        }

        function verifyOTP() {
            const inputs = document.querySelectorAll('.otp-input');
            const otp = Array.from(inputs).map(i => i.value).join('');

            if (otp === '123456') {
                const user = JSON.parse(sessionStorage.getItem('currentUser'));
                alert('Login successful! Redirecting...');

                if (user && user.role === 'admin') {
                    window.location.href = 'admin/dashboard.html';
                } else {
                    window.location.href = 'employee/dashboard.html';
                }
            } else {
                alert('Invalid OTP. Use 123456');
                inputs.forEach(i => i.value = '');
                inputs[0].focus();
            }
        }

        function closeOTPModal() {
            document.getElementById('otpModal').style.display = 'none';
            if (otpTimer) clearInterval(otpTimer);
        }

        // Make functions global
        window.showLogin = showLogin;
        window.showRegister = showRegister;
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.moveToNext = moveToNext;
        window.verifyOTP = verifyOTP;
        window.resendOTP = resendOTP;
        window.closeOTPModal = closeOTPModal;
        window.allowOnlyNumbers = allowOnlyNumbers;

        // Close modal when clicking outside
        window.onclick = function (event) {
            const modal = document.getElementById('otpModal');
            if (event.target === modal) {
                modal.style.display = 'none';
                if (otpTimer) clearInterval(otpTimer);
            }
        };

        // Check if backend is reachable on load
        fetch(`${API_URL}/health`)
            .then(response => response.json())
            .then(data => console.log('✅ Backend connected:', data))
            .catch(error => console.error('❌ Backend not reachable:', error));
    </script>
</body>

</html>
