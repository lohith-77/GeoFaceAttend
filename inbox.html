<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Inbox - GeoFaceAttend</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="GeoFaceAttend">
    <meta name="theme-color" content="#4361ee">
    <link rel="apple-touch-icon" href="/assets/icons/icon-152x152.png">

    <style>
        body {
            background: var(--bg-secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .email-container {
            max-width: 900px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 25px -5px var(--shadow-color);
            border: 1px solid var(--border-color);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .email-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .email-header h1 {
            color: var(--text-primary);
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .email-header h1 i {
            color: var(--primary);
            font-size: 32px;
        }

        .inbox-stats {
            background: var(--bg-tertiary);
            padding: 10px 20px;
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            border: 1px solid var(--border-color);
        }

        .inbox-stats i {
            color: var(--primary);
            margin-right: 8px;
        }

        .email-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .email-list::-webkit-scrollbar {
            width: 6px;
        }

        .email-list::-webkit-scrollbar-track {
            background: var(--bg-tertiary);
            border-radius: 10px;
        }

        .email-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .email-item {
            background: var(--bg-tertiary);
            border-radius: 16px;
            padding: 20px;
            border-left: 6px solid var(--primary);
            transition: all 0.3s;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .email-item:hover {
            transform: translateX(8px);
            box-shadow: 0 8px 16px var(--shadow-color);
            background: var(--hover-bg);
        }

        .email-item.unread {
            border-left-color: #10b981;
            background: linear-gradient(90deg, rgba(16, 185, 129, 0.05), var(--bg-tertiary));
        }

        .email-subject {
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 12px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .email-subject i {
            color: var(--primary);
            font-size: 18px;
        }

        .email-content {
            color: var(--text-secondary);
            font-size: 14px;
            white-space: pre-line;
            line-height: 1.6;
            margin-bottom: 15px;
            padding: 15px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .email-meta {
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
        }

        .email-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .email-actions {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        .email-actions button {
            padding: 8px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .reply-btn {
            background: var(--primary);
            color: white;
        }

        .reply-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .forward-btn {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }

        .forward-btn:hover {
            background: var(--hover-bg);
            transform: translateY(-2px);
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        .empty-inbox {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-inbox i {
            font-size: 80px;
            margin-bottom: 25px;
            color: var(--primary);
            opacity: 0.5;
        }

        .empty-inbox h3 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .empty-inbox button {
            padding: 12px 30px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .empty-inbox button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .refresh-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: var(--primary);
            color: white;
            transform: rotate(180deg);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 30px;
            border: 1px solid var(--border-color);
            transition: all 0.3s;
        }

        .back-link:hover {
            background: var(--primary);
            color: white;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-btn:hover {
            background: var(--primary);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="email-container">
        <a href="javascript:history.back()" class="back-link">
            <i class="fas fa-arrow-left"></i> Back
        </a>

        <div class="email-header">
            <h1><i class="fas fa-envelope"></i> Inbox</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="inbox-stats">
                    <i class="fas fa-inbox"></i> <span id="emailCount">0</span> messages
                </div>
                <button class="refresh-btn" onclick="loadEmails()" title="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterEmails('all')">All</button>
            <button class="filter-btn" onclick="filterEmails('unread')">Unread</button>
            <button class="filter-btn" onclick="filterEmails('today')">Today</button>
        </div>

        <div class="email-list" id="emailList">
            <!-- Emails will be loaded here -->
        </div>
    </div>

    <!-- Reply Modal -->
    <div id="replyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-reply"></i> Reply to Email</h3>
                <button class="modal-close" onclick="closeReplyModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>To</label>
                    <input type="text" id="replyTo" readonly class="form-control">
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="replySubject" class="form-control">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="replyMessage" rows="5" class="form-control"></textarea>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="sendReply()" class="btn-primary" style="flex: 1;">Send</button>
                    <button onclick="closeReplyModal()" class="btn-outline" style="flex: 1;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Forward Modal -->
    <div id="forwardModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-forward"></i> Forward Email</h3>
                <button class="modal-close" onclick="closeForwardModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>To</label>
                    <input type="email" id="forwardTo" class="form-control">
                </div>
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" id="forwardSubject" class="form-control">
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea id="forwardMessage" rows="5" class="form-control"></textarea>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button onclick="sendForward()" class="btn-primary" style="flex: 1;">Send</button>
                    <button onclick="closeForwardModal()" class="btn-outline" style="flex: 1;">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentFilter = 'all';
        let currentReplyData = null;

        function loadEmails() {
            const emails = JSON.parse(localStorage.getItem('emails') || '[]');
            const emailList = document.getElementById('emailList');
            const emailCount = document.getElementById('emailCount');

            emailCount.textContent = emails.length;

            if (emails.length === 0) {
                emailList.innerHTML = `
                    <div class="empty-inbox">
                        <i class="fas fa-envelope-open"></i>
                        <h3>No emails yet</h3>
                        <p>When you receive notifications, they'll appear here</p>
                        <button onclick="window.location.href='employee/dashboard.html'">
                            <i class="fas fa-arrow-left"></i> Back
                        </button>
                    </div>
                `;
                return;
            }

            let filteredEmails = emails;
            const now = new Date();
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

            if (currentFilter === 'unread') {
                filteredEmails = emails.filter(e => !e.read);
            } else if (currentFilter === 'today') {
                filteredEmails = emails.filter(e => new Date(e.timestamp).getTime() >= today);
            }

            emailList.innerHTML = filteredEmails.map((email, index) => {
                const originalIndex = emails.findIndex(e => e.timestamp === email.timestamp);
                return `
                <div class="email-item ${email.read ? '' : 'unread'}" onclick="markAsRead(${originalIndex})">
                    <div class="email-subject">
                        <i class="fas fa-${email.read ? 'envelope-open' : 'envelope'}"></i>
                        ${email.subject}
                    </div>
                    <div class="email-content">${(email.text || email.content || '').substring(0, 200)}...</div>
                    <div class="email-meta">
                        <span><i class="fas fa-clock"></i> ${new Date(email.timestamp).toLocaleString()}</span>
                    </div>
                    <div class="email-actions">
                        <button class="reply-btn" onclick="event.stopPropagation(); openReplyModal('${email.subject}', '${(email.text || email.content || '').replace(/'/g, "\\'")}')">
                            <i class="fas fa-reply"></i> Reply
                        </button>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteEmail(${originalIndex})">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `}).join('');
        }

        function filterEmails(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            loadEmails();
        }

        function markAsRead(index) {
            const emails = JSON.parse(localStorage.getItem('emails') || '[]');
            if (emails[index]) {
                emails[index].read = true;
                localStorage.setItem('emails', JSON.stringify(emails));
                loadEmails();
            }
        }

        function deleteEmail(index) {
            if (!confirm('Delete this email?')) return;
            const emails = JSON.parse(localStorage.getItem('emails') || '[]');
            emails.splice(index, 1);
            localStorage.setItem('emails', JSON.stringify(emails));
            loadEmails();
            alert('Email deleted');
        }

        function openReplyModal(subject, content) {
            currentReplyData = { subject, content };
            document.getElementById('replyTo').value = 'admin@geofaceattend.com';
            document.getElementById('replySubject').value = `Re: ${subject}`;
            document.getElementById('replyMessage').value = '';
            document.getElementById('replyModal').style.display = 'flex';
        }

        function closeReplyModal() {
            document.getElementById('replyModal').style.display = 'none';
            currentReplyData = null;
        }

        function sendReply() {
            const to = document.getElementById('replyTo').value;
            const subject = document.getElementById('replySubject').value;
            const message = document.getElementById('replyMessage').value;

            if (!message.trim()) {
                alert('Please enter a message');
                return;
            }

            const emails = JSON.parse(localStorage.getItem('emails') || '[]');
            emails.unshift({
                to, subject,
                content: `REPLY: ${message}`,
                timestamp: new Date().toISOString(),
                read: false
            });
            localStorage.setItem('emails', JSON.stringify(emails));

            closeReplyModal();
            loadEmails();
            alert('Reply sent');
        }

        function sendForward() {
            const to = document.getElementById('forwardTo').value;
            const subject = document.getElementById('forwardSubject').value;
            const message = document.getElementById('forwardMessage').value;

            if (!to || !message) {
                alert('Please fill all fields');
                return;
            }

            const emails = JSON.parse(localStorage.getItem('emails') || '[]');
            emails.unshift({
                to, subject,
                content: message,
                timestamp: new Date().toISOString(),
                read: false
            });
            localStorage.setItem('emails', JSON.stringify(emails));

            closeForwardModal();
            loadEmails();
            alert('Email forwarded');
        }

        function closeForwardModal() {
            document.getElementById('forwardModal').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', loadEmails);
        setInterval(loadEmails, 30000);

        window.onclick = function (event) {
            if (event.target === document.getElementById('replyModal')) closeReplyModal();
            if (event.target === document.getElementById('forwardModal')) closeForwardModal();
        };
    </script>
</body>

</html>
